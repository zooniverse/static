apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: measuringtheanzacs-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: measuringtheanzacs-org-tls
  dnsNames:
    - measuringtheanzacs.org
    - "*.measuringtheanzacs.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: measuringtheanzacs.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`measuringtheanzacs.org`) || HostRegexp(`^.+\.measuringtheanzacs\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: measuringtheanzacs-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pulsarhunters-com-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: pulsarhunters-com-tls
  dnsNames:
    - pulsarhunters.com
    - "*.pulsarhunters.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsarhunters.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulsarhunters.com`) || HostRegexp(`^.+\.pulsarhunters\.com$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: pulsarhunters-com-tls

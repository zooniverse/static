apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: condorwatch-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: condorwatch-org-tls
  dnsNames:
    - condorwatch.org
    - "*.condorwatch.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: condorwatch.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`condorwatch.org`) || HostRegexp(`^.+\.condorwatch\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: condorwatch-org-tls

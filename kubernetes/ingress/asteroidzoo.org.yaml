apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: asteroidzoo-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: asteroidzoo-org-tls
  dnsNames:
    - asteroidzoo.org
    - "*.asteroidzoo.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: asteroidzoo.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`asteroidzoo.org`) || HostRegexp(`^.+\.asteroidzoo\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: asteroidzoo-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ancientlives-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: ancientlives-org-tls
  dnsNames:
    - ancientlives.org
    - "*.ancientlives.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ancientlives.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ancientlives.org`) || HostRegexp(`^.+\.ancientlives\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: ancientlives-org-tls

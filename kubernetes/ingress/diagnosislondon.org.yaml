apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: diagnosislondon-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: diagnosislondon-org-tls
  dnsNames:
    - diagnosislondon.org
    - "*.diagnosislondon.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: diagnosislondon.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`diagnosislondon.org`) || HostRegexp(`^.+\.diagnosislondon\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: diagnosislondon-org-tls

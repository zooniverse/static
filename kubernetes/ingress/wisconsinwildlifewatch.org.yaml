apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wisconsinwildlifewatch-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: wisconsinwildlifewatch-org-tls
  dnsNames:
    - wisconsinwildlifewatch.org
    - "*.wisconsinwildlifewatch.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wisconsinwildlifewatch.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`wisconsinwildlifewatch.org`) || HostRegexp(`^.+\.wisconsinwildlifewatch\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: wisconsinwildlifewatch-org-tls

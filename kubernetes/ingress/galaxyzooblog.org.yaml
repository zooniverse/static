apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: galaxyzooblog-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: galaxyzooblog-org-tls
  dnsNames:
    - galaxyzooblog.org
    - "*.galaxyzooblog.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: galaxyzooblog.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`galaxyzooblog.org`) || HostRegexp(`^.+\.galaxyzooblog\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: galaxyzooblog-org-tls
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: backyardworlds-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: backyardworlds-org-tls
  dnsNames:
    - backyardworlds.org
    - "*.backyardworlds.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: backyardworlds.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`backyardworlds.org`) || HostRegexp(`^.+\.backyardworlds\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: backyardworlds-org-tls

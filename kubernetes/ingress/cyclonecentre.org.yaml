apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cyclonecentre-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: cyclonecentre-org-tls
  dnsNames:
    - cyclonecentre.org
    - "*.cyclonecentre.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cyclonecentre.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cyclonecentre.org`) || HostRegexp(`^.+\.cyclonecentre\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: cyclonecentre-org-tls

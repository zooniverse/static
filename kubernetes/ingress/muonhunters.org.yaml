apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: muonhunters-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: muonhunters-org-tls
  dnsNames:
    - muonhunters.org
    - "*.muonhunters.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: muonhunters.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`muonhunters.org`) || HostRegexp(`^.+\.muonhunters\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: muonhunters-org-tls

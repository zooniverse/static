apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zwickytransients-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: zwickytransients-org-tls
  dnsNames:
    - zwickytransients.org
    - "*.zwickytransients.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zwickytransients.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zwickytransients.org`) || HostRegexp(`^.+\.zwickytransients\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: zwickytransients-org-tls

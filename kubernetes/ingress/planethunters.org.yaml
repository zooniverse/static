apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planethunters-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planethunters-org-tls
  dnsNames:
    - planethunters.org
    - "*.planethunters.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planethunters.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planethunters.org`) || HostRegexp(`^.+\.planethunters\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planethunters-org-tls

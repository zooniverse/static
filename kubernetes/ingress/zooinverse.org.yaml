apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zooinverse-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: zooinverse-org-tls
  dnsNames:
    - zooinverse.org
    - "*.zooinverse.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zooinverse.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zooinverse.org`) || HostRegexp(`^.+\.zooinverse\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: zooinverse-org-tls

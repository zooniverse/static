apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: notesfromnature-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: notesfromnature-org-tls
  dnsNames:
    - notesfromnature.org
    - "*.notesfromnature.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notesfromnature.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`notesfromnature.org`) || HostRegexp(`^.+\.notesfromnature\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: notesfromnature-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: microplants-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: microplants-org-tls
  dnsNames:
    - microplants.org
    - "*.microplants.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: microplants.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`microplants.org`) || HostRegexp(`^.+\.microplants\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: microplants-org-tls

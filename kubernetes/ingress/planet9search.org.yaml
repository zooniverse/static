apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planet9search-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planet9search-org-tls
  dnsNames:
    - planet9search.org
    - "*.planet9search.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planet9search.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planet9search.org`) || HostRegexp(`^.+\.planet9search\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planet9search-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pulsarhunter-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: pulsarhunter-org-tls
  dnsNames:
    - pulsarhunter.org
    - "*.pulsarhunter.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsarhunter.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulsarhunter.org`) || HostRegexp(`^.+\.pulsarhunter\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: pulsarhunter-org-tls

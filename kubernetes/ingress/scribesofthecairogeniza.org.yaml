apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: scribesofthecairogeniza-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: scribesofthecairogeniza-org-tls
  dnsNames:
    - scribesofthecairogeniza.org
    - "*.scribesofthecairogeniza.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scribesofthecairogeniza.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`scribesofthecairogeniza.org`) || HostRegexp(`^.+\.scribesofthecairogeniza\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: scribesofthecairogeniza-org-tls

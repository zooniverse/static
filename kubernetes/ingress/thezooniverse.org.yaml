apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: thezooniverse-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: thezooniverse-org-tls
  dnsNames:
    - thezooniverse.org
    - "*.thezooniverse.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: thezooniverse.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`thezooniverse.org`) || HostRegexp(`^.+\.thezooniverse\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: thezooniverse-org-tls
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: solarstormwatch-com-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: solarstormwatch-com-tls
  dnsNames:
    - solarstormwatch.com
    - "*.solarstormwatch.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: solarstormwatch.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`solarstormwatch.com`) || HostRegexp(`^.+\.solarstormwatch\.com$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: solarstormwatch-com-tls

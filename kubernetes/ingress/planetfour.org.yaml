apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planetfour-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planetfour-org-tls
  dnsNames:
    - planetfour.org
    - "*.planetfour.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planetfour.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planetfour.org`) || HostRegexp(`^.+\.planetfour\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planetfour-org-tls

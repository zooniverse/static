apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: higgshunters-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: higgshunters-org-tls
  dnsNames:
    - higgshunters.org
    - "*.higgshunters.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: higgshunters.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`higgshunters.org`) || HostRegexp(`^.+\.higgshunters\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: higgshunters-org-tls

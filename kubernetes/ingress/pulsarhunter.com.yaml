apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pulsarhunter-com-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: pulsarhunter-com-tls
  dnsNames:
    - pulsarhunter.com
    - "*.pulsarhunter.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsarhunter.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulsarhunter.com`) || HostRegexp(`^.+\.pulsarhunter\.com$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: pulsarhunter-com-tls
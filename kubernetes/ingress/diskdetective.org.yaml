apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: diskdetective-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: diskdetective-org-tls
  dnsNames:
    - diskdetective.org
    - "*.diskdetective.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: diskdetective.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`diskdetective.org`) || HostRegexp(`^.+\.diskdetective\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: diskdetective-org-tls

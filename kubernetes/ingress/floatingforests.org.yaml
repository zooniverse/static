apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: floatingforests-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: floatingforests-org-tls
  dnsNames:
    - floatingforests.org
    - "*.floatingforests.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: floatingforests.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`floatingforests.org`) || HostRegexp(`^.+\.floatingforests\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: floatingforests-org-tls

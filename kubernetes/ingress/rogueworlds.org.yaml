apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rogueworlds-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: rogueworlds-org-tls
  dnsNames:
    - rogueworlds.org
    - "*.rogueworlds.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rogueworlds.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rogueworlds.org`) || HostRegexp(`^.+\.rogueworlds\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: rogueworlds-org-tls

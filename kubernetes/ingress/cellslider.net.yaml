apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cellslider-net-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: cellslider-net-tls
  dnsNames:
    - cellslider.net
    - "*.cellslider.net"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cellslider.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cellslider.net`) || HostRegexp(`^.+\.cellslider\.net$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: cellslider-net-tls
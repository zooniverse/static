apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seafloorexplorer-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: seafloorexplorer-org-tls
  dnsNames:
    - seafloorexplorer.org
    - "*.seafloorexplorer.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seafloorexplorer.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`seafloorexplorer.org`) || HostRegexp(`^.+\.seafloorexplorer\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: seafloorexplorer-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: snapshotsupernova-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: snapshotsupernova-org-tls
  dnsNames:
    - snapshotsupernova.org
    - "*.snapshotsupernova.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: snapshotsupernova.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`snapshotsupernova.org`) || HostRegexp(`^.+\.snapshotsupernova\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: snapshotsupernova-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: andromedaproject-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: andromedaproject-org-tls
  dnsNames:
    - andromedaproject.org
    - "*.andromedaproject.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: andromedaproject.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`andromedaproject.org`) || HostRegexp(`^.+\.andromedaproject\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: andromedaproject-org-tls

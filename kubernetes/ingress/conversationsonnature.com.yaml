apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: conversationsonnature-com-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: conversationsonnature-com-tls
  dnsNames:
    - conversationsonnature.com
    - "*.conversationsonnature.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: conversationsonnature.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`conversationsonnature.com`) || HostRegexp(`^.+\.conversationsonnature\.com$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: conversationsonnature-com-tls

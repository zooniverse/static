apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planet4-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planet4-org-tls
  dnsNames:
    - planet4.org
    - "*.planet4.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planet4.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planet4.org`) || HostRegexp(`^.+\.planet4\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planet4-org-tls
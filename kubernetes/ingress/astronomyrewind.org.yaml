apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: astronomyrewind-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: astronomyrewind-org-tls
  dnsNames:
    - astronomyrewind.org
    - "*.astronomyrewind.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: astronomyrewind.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`astronomyrewind.org`) || HostRegexp(`^.+\.astronomyrewind\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: astronomyrewind-org-tls

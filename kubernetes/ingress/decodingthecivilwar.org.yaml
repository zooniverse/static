apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: decodingthecivilwar-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: decodingthecivilwar-org-tls
  dnsNames:
    - decodingthecivilwar.org
    - "*.decodingthecivilwar.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: decodingthecivilwar.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`decodingthecivilwar.org`) || HostRegexp(`^.+\.decodingthecivilwar\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: decodingthecivilwar-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: setilive-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: setilive-org-tls
  dnsNames:
    - setilive.org
    - "*.setilive.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: setilive.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`setilive.org`) || HostRegexp(`^.+\.setilive\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: setilive-org-tls

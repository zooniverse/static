apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: moonzoo-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: moonzoo-org-tls
  dnsNames:
    - moonzoo.org
    - "*.moonzoo.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: moonzoo.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`moonzoo.org`) || HostRegexp(`^.+\.moonzoo\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: moonzoo-org-tls

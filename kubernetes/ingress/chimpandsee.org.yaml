apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: chimpandsee-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: chimpandsee-org-tls
  dnsNames:
    - chimpandsee.org
    - "*.chimpandsee.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: chimpandsee.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`chimpandsee.org`) || HostRegexp(`^.+\.chimpandsee\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: chimpandsee-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: muonhunter-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: muonhunter-org-tls
  dnsNames:
    - muonhunter.org
    - "*.muonhunter.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: muonhunter.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`muonhunter.org`) || HostRegexp(`^.+\.muonhunter\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: muonhunter-org-tls
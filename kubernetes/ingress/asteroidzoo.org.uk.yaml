apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: asteroidzoo-org-uk-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: asteroidzoo-org-uk-tls
  dnsNames:
    - asteroidzoo.org.uk
    - "*.asteroidzoo.org.uk"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: asteroidzoo.org.uk
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`asteroidzoo.org.uk`) || HostRegexp(`^.+\.asteroidzoo\.org\.uk$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: asteroidzoo-org-uk-tls

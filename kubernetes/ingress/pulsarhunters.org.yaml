apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pulsarhunters-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: pulsarhunters-org-tls
  dnsNames:
    - pulsarhunters.org
    - "*.pulsarhunters.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulsarhunters.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pulsarhunters.org`) || HostRegexp(`^.+\.pulsarhunters\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: pulsarhunters-org-tls

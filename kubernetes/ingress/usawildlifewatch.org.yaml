apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: usawildlifewatch-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: usawildlifewatch-org-tls
  dnsNames:
    - usawildlifewatch.org
    - "*.usawildlifewatch.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: usawildlifewatch.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`usawildlifewatch.org`) || HostRegexp(`^.+\.usawildlifewatch\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: usawildlifewatch-org-tls

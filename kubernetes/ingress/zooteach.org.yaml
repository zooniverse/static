apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zooteach-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: zooteach-org-tls
  dnsNames:
    - zooteach.org
    - "*.zooteach.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zooteach.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`zooteach.org`) || HostRegexp(`^.+\.zooteach\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: zooteach-org-tls

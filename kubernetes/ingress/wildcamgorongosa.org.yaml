apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcamgorongosa-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: wildcamgorongosa-org-tls
  dnsNames:
    - wildcamgorongosa.org
    - www.wildcamgorongosa.org
    - lab.wildcamgorongosa.org
    - learn.wildcamgorongosa.org
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wildcamgorongosa.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`wildcamgorongosa.org`) || Host(`www.wildcamgorongosa.org`) || Host(`lab.wildcamgorongosa.org`) || Host(`learn.wildcamgorongosa.org`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: wildcamgorongosa-org-tls

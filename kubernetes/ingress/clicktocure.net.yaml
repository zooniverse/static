apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clicktocure-net-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: clicktocure-net-tls
  dnsNames:
    - clicktocure.net
    - "*.clicktocure.net"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: clicktocure.net
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`clicktocure.net`) || HostRegexp(`^.+\.clicktocure\.net$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: clicktocure-net-tls

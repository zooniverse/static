apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sciencegossip-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: sciencegossip-org-tls
  dnsNames:
    - sciencegossip.org
    - "*.sciencegossip.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sciencegossip.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sciencegossip.org`) || HostRegexp(`^.+\.sciencegossip\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: sciencegossip-org-tls

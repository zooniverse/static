apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: snapshotsupernovae-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: snapshotsupernovae-org-tls
  dnsNames:
    - snapshotsupernovae.org
    - "*.snapshotsupernovae.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: snapshotsupernovae.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`snapshotsupernovae.org`) || HostRegexp(`^.+\.snapshotsupernovae\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: snapshotsupernovae-org-tls
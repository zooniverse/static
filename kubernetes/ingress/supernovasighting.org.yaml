apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: supernovasighting-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: supernovasighting-org-tls
  dnsNames:
    - supernovasighting.org
    - "*.supernovasighting.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supernovasighting.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`supernovasighting.org`) || HostRegexp(`^.+\.supernovasighting\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: supernovasighting-org-tls

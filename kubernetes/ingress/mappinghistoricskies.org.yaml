apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mappinghistoricskies-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: mappinghistoricskies-org-tls
  dnsNames:
    - mappinghistoricskies.org
    - "*.mappinghistoricskies.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mappinghistoricskies.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mappinghistoricskies.org`) || HostRegexp(`^.+\.mappinghistoricskies\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: mappinghistoricskies-org-tls

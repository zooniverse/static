apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planetninesearch-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planetninesearch-org-tls
  dnsNames:
    - planetninesearch.org
    - "*.planetninesearch.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planetninesearch.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planetninesearch.org`) || HostRegexp(`^.+\.planetninesearch\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planetninesearch-org-tls
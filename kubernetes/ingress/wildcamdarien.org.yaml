apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcamdarien-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: wildcamdarien-org-tls
  dnsNames:
    - wildcamdarien.org
    - "*.wildcamdarien.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wildcamdarien.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`wildcamdarien.org`) || HostRegexp(`^.+\.wildcamdarien\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: wildcamdarien-org-tls

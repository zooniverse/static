apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: orchidobservers-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: orchidobservers-org-tls
  dnsNames:
    - orchidobservers.org
    - "*.orchidobservers.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: orchidobservers.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`orchidobservers.org`) || HostRegexp(`^.+\.orchidobservers\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: orchidobservers-org-tls
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planetaryresponsenetwork-com-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planetaryresponsenetwork-com-tls
  dnsNames:
    - planetaryresponsenetwork.com
    - "*.planetaryresponsenetwork.com"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planetaryresponsenetwork.com
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planetaryresponsenetwork.com`) || HostRegexp(`^.+\.planetaryresponsenetwork\.com$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planetaryresponsenetwork-com-tls

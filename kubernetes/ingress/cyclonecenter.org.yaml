apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cyclonecenter-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: cyclonecenter-org-tls
  dnsNames:
    - cyclonecenter.org
    - "*.cyclonecenter.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cyclonecenter.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cyclonecenter.org`) || HostRegexp(`^.+\.cyclonecenter\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: cyclonecenter-org-tls

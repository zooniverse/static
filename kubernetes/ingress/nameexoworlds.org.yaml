apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nameexoworlds-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: nameexoworlds-org-tls
  dnsNames:
    - nameexoworlds.org
    - "*.nameexoworlds.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nameexoworlds.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nameexoworlds.org`) || HostRegexp(`^.+\.nameexoworlds\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: nameexoworlds-org-tls

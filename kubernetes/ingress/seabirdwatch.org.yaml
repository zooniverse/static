apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seabirdwatch-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: seabirdwatch-org-tls
  dnsNames:
    - seabirdwatch.org
    - www.seabirdwatch.org
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seabirdwatch.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`seabirdwatch.org`) || Host(`www.seabirdwatch.org`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: seabirdwatch-org-tls

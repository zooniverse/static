apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: citizensciencealliance-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: citizensciencealliance-org-tls
  dnsNames:
    - citizensciencealliance.org
    - "*.citizensciencealliance.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: citizensciencealliance.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`citizensciencealliance.org`) || HostRegexp(`^.+\.citizensciencealliance\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: citizensciencealliance-org-tls

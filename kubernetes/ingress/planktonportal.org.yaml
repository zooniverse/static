apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planktonportal-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planktonportal-org-tls
  dnsNames:
    - planktonportal.org
    - "*.planktonportal.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planktonportal.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planktonportal.org`) || HostRegexp(`^.+\.planktonportal\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planktonportal-org-tls
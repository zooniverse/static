apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shakespearesworld-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: shakespearesworld-org-tls
  dnsNames:
    - shakespearesworld.org
    - "*.shakespearesworld.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: shakespearesworld.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`shakespearesworld.org`) || HostRegexp(`^.+\.shakespearesworld\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: shakespearesworld-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gravityspy-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: gravityspy-org-tls
  dnsNames:
    - gravityspy.org
    - "*.gravityspy.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gravityspy.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gravityspy.org`) || HostRegexp(`^.+\.gravityspy\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: gravityspy-org-tls

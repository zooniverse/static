apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: milkywayproject-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: milkywayproject-org-tls
  dnsNames:
    - milkywayproject.org
    - "*.milkywayproject.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: milkywayproject.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`milkywayproject.org`) || HostRegexp(`^.+\.milkywayproject\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: milkywayproject-org-tls

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: planetaryresponsenetwork-org-tls
  labels:
    use-azuredns-solver: "true"
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: planetaryresponsenetwork-org-tls
  dnsNames:
    - planetaryresponsenetwork.org
    - "*.planetaryresponsenetwork.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: planetaryresponsenetwork.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`planetaryresponsenetwork.org`) || HostRegexp(`^.+\.planetaryresponsenetwork\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: planetaryresponsenetwork-org-tls

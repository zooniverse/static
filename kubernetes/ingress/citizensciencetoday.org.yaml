apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: citizensciencetoday-org-tls
spec:
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  secretName: citizensciencetoday-org-tls
  dnsNames:
    - www.citizensciencetoday.org
    - "*.citizensciencetoday.org"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: citizensciencetoday.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`citizensciencetoday.org`) || HostRegexp(`^.+\.citizensciencetoday\.org$`)
      kind: Rule
      services:
        - name: http-frontend
          port: 80
  tls:
    secretName: citizensciencetoday-org-tls
